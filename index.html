<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Litho SEO Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#efeeea;--bg4:#e9e8e3;
  --bd:#e8e7e2;--bd2:#f0efe9;
  --t1:#1a1917;--t2:#787672;--t3:#a8a59e;
  --ac:#7c5cbf;--ac2:#f0ebfa;--ac3:#6a4daa;
  --gn:#4caf7d;--or:#e8935a;--rd:#d95f5f;
  --font:'DM Sans',-apple-system,sans-serif;
  --mono:'DM Mono','Courier New',monospace;
  --r:8px;--r2:12px;--sw:220px;
}
body{font-family:var(--font);font-size:14px;color:var(--t1);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer}
input,textarea,select{font-family:var(--font)}
#app{display:flex;height:100vh;overflow:hidden}
aside{width:var(--sw);height:100vh;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sh{display:flex;align-items:center;justify-content:space-between;padding:18px 14px 14px;border-bottom:1px solid var(--bd)}
.logo{display:flex;align-items:center;gap:8px}
.gem{font-size:18px;color:var(--ac)}
.logo-t{font-size:14px;font-weight:600;color:var(--t1);letter-spacing:-.01em}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:background .3s}
.sdot.ok{background:var(--gn)}.sdot.err{background:var(--rd)}
.snav{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:1px}
.ns{font-size:10.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;padding:12px 10px 4px;margin-top:4px}
.ns:first-child{padding-top:4px;margin-top:0}
.ni{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);color:var(--t2);font-size:13.5px;cursor:pointer;transition:background .12s,color .12s;user-select:none}
.ni:hover{background:var(--bg3);color:var(--t1)}
.ni.active{background:var(--bg4);color:var(--t1);font-weight:500}
.nic{font-size:14px;width:18px;text-align:center;flex-shrink:0;color:var(--t3)}
.ni.active .nic,.ni:hover .nic{color:var(--ac)}
main{flex:1;overflow-y:auto;background:var(--bg)}
.pg{display:none;padding:40px 48px;max-width:960px;animation:fi .15s ease}
.pg.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ph{margin-bottom:32px}
.pt{font-size:22px;font-weight:600;color:var(--t1);letter-spacing:-.02em;margin-bottom:4px}
.ps{font-size:13.5px;color:var(--t2)}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px 18px}
.sv{font-size:26px;font-weight:600;color:var(--t1);letter-spacing:-.03em;line-height:1.1}
.sl{font-size:12px;color:var(--t3);margin-top:4px}
.card{border:1px solid var(--bd);border-radius:var(--r2);padding:20px 24px;margin-bottom:14px;background:var(--bg)}
.ct{font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:13.5px;font-weight:500;border:none;cursor:pointer;transition:background .12s}
.bp{background:var(--ac);color:#fff}.bp:hover{background:var(--ac3)}
.bs{background:var(--bg2);color:var(--t1);border:1px solid var(--bd)}.bs:hover{background:var(--bg3)}
.bg{background:transparent;color:var(--t2);border:1px solid var(--bd)}.bg:hover{background:var(--bg3);color:var(--t1)}
.btn-google{background:#fff;color:#3c4043;border:1px solid var(--bd);display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:var(--r);font-size:13.5px;font-weight:500;cursor:pointer;transition:background .12s}
.btn-google:hover{background:var(--bg2)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.fg{margin-bottom:16px}
.fl{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:6px}
.fh{font-size:12px;color:var(--t3);margin-top:4px}
.inp{width:100%;padding:8px 12px;border:1px solid var(--bd);border-radius:var(--r);font-size:13.5px;color:var(--t1);background:var(--bg);outline:none;transition:border .12s}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac2)}
.bge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:500}
.b-gray{background:var(--bg2);color:var(--t2)}.b-green{background:#edf7f1;color:#2d8a5a}
.b-purple{background:var(--ac2);color:var(--ac)}.b-orange{background:#fdf3ec;color:#c4622a}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.dv{height:1px;background:var(--bd);margin:22px 0}
.tw{display:flex;flex-wrap:wrap;gap:10px}
.al{display:flex;gap:12px;padding:13px 16px;border-radius:var(--r);margin-bottom:18px;font-size:13.5px;line-height:1.5}
.al-i{background:var(--ac2);border:1px solid #d4c4f0;color:#4a2d8a}
.al-w{background:#fffbeb;border:1px solid #f5d878;color:#7a5c00}
.tbl-wrap{border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg2)}
th{padding:10px 14px;text-align:left;font-size:11.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bd)}
tbody tr{border-bottom:1px solid var(--bd2);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg2)}
td{padding:10px 14px;font-size:13.5px;vertical-align:middle}
.chat-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px;margin-bottom:6px;font-size:13px;line-height:1.7}
.chat-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:10px}
.chat-section{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--bd2)}
.chat-section:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.chat-kv{display:flex;align-items:baseline;gap:8px;padding:3px 0;font-size:13px}
.chat-kv-label{color:var(--t2);min-width:130px;flex-shrink:0;font-size:12.5px}
.chat-kv-value{color:var(--t1);font-weight:500}
.chat-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:600}
.cb-red{background:#fdeaea;color:#b53030}.cb-orange{background:#fdf3ec;color:#c4622a}
.cb-green{background:#edf7f1;color:#2d8a5a}.cb-blue{background:#e8f0fe;color:#1a73e8}
.cb-purple{background:var(--ac2);color:var(--ac)}.cb-gray{background:var(--bg3);color:var(--t2)}
.chat-list{list-style:none;padding:0;margin:4px 0}
.chat-list li{padding:4px 0;border-bottom:1px solid var(--bd2);display:flex;align-items:center;gap:8px;font-size:13px}
.chat-list li:last-child{border-bottom:none}
.chat-pos{display:inline-flex;align-items:center;justify-content:center;width:28px;height:18px;border-radius:4px;font-size:11px;font-weight:700;flex-shrink:0}
.pos-red{background:#fdeaea;color:#b53030}.pos-orange{background:#fdf3ec;color:#c4622a}
.pos-green{background:#edf7f1;color:#2d8a5a}.pos-gray{background:var(--bg3);color:var(--t2)}
#tc{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:1000}
.tos{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--r2);font-size:13.5px;max-width:300px;color:#fff;animation:fi .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.t-ok{background:#1f5c3a}.t-err{background:#7a2020}.t-def{background:var(--t1)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--t3)}
</style>
</head>
<body>
<div id="app">
  <aside>
    <div class="sh">
      <div class="logo"><span class="gem">◈</span><span class="logo-t">Litho SEO <span style="font-size:10px;font-weight:400;color:var(--t3);font-family:var(--mono)">v4.5</span></span></div>
      <div class="sdot" id="sdot" title="Statut Shopify"></div>
    </div>
    <nav class="snav">
      <div class="ns">Contenu</div>
      <div class="ni active" data-p="dashboard"><span class="nic">⬡</span><span>Tableau de bord</span></div>
      <div class="ni" data-p="articles"><span class="nic">◎</span><span>Articles</span></div>
      <div class="ni" data-p="create"><span class="nic">✦</span><span>Créer un article</span></div>
      <div class="ni" data-p="optimize"><span class="nic">⟳</span><span>Optimiser</span></div>
      <div class="ni" data-p="cocon"><span class="nic">⬟</span><span>Cocon</span></div>
      <div class="ni" data-p="history"><span class="nic">◷</span><span>Historique</span></div>
      <div class="ns">Configuration</div>
      <div class="ni" data-p="connections"><span class="nic">⚡</span><span>Connexions</span></div>
      <div class="ni" data-p="prompts"><span class="nic">✎</span><span>Prompts</span></div>
      <div class="ni" data-p="settings"><span class="nic">⚙</span><span>Réglages</span></div>
    </nav>
  </aside>
  <main>
    <div id="p-dashboard"   class="pg on"></div>
    <div id="p-articles"    class="pg"></div>
    <div id="p-create"      class="pg"></div>
    <div id="p-optimize"    class="pg"></div>
    <div id="p-cocon"       class="pg"></div>
    <div id="p-history"     class="pg"></div>
    <div id="p-connections" class="pg"></div>
    <div id="p-prompts"     class="pg"></div>
    <div id="p-settings"    class="pg"></div>
  </main>
</div>
<div id="tc"></div>
<script>
const SHOPIFY_OAUTH_CLIENT_ID='da4180870578d677f280e3f34bc54cf9';
const GOOGLE_DEFAULTS={
  client_id:'',
  client_secret:''
};
const GOOGLE_SCOPES=[
  'https://www.googleapis.com/auth/webmasters.readonly',
  'https://www.googleapis.com/auth/analytics.readonly',
  'https://www.googleapis.com/auth/spreadsheets'
].join(' ');

const S={
  get(k){try{const v=localStorage.getItem('litho_'+k);if(!v)return null;try{return JSON.parse(v)}catch{return v}}catch{return null}},
  getRaw(k){try{return localStorage.getItem('litho_'+k)||null}catch{return null}},
  set(k,v){try{localStorage.setItem('litho_'+k,typeof v==='string'?v:JSON.stringify(v))}catch{}},
  has(){return!!(this.get('shopify_domain')&&this.get('shopify_token')&&this.get('proxy_url'))},
  hist(){return this.get('history')||[]},
  addHist(e){const h=this.hist();h.unshift({...e,id:Date.now(),date:new Date().toISOString()});this.set('history',h.slice(0,200))}
};

function toast(msg,t='def'){
  const c=document.getElementById('tc'),el=document.createElement('div');
  el.className='tos t-'+t;
  el.innerHTML='<span>'+(t==='ok'?'✓':t==='err'?'✕':'◈')+'</span><span>'+msg+'</span>';
  c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .2s';setTimeout(()=>el.remove(),200)},3500);
}
function setDot(s){
  const d=document.getElementById('sdot');
  d.className='sdot'+(s==='ok'?' ok':s==='err'?' err':'');
  d.title=s==='ok'?'Shopify connecté':s==='err'?'Erreur connexion':'Non configuré';
}
function fd(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})}
function sh(h){const d=document.createElement('div');d.innerHTML=h;return d.textContent||''}
function wc(h){return sh(h).trim().split(/\s+/).filter(Boolean).length}
function tr(s,n=65){return s&&s.length>n?s.slice(0,n)+'…':(s||'')}
function sp(){return'<span class="spinner"></span>'}

function nav(p){
  document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('active',el.dataset.p===p));
  document.querySelectorAll('.pg').forEach(el=>el.classList.toggle('on',el.id==='p-'+p));
  ({dashboard:rDash,articles:rArticles,connections:rConn,prompts:rPrompts,settings:rSettings,history:rHist,
    create:rCreate,
    optimize:rOptimize,
    cocon:rCocon,
  })[p]?.();
}

async function sReq(path,method='GET',body=null){
  const proxy=S.get('proxy_url'),domain=S.get('shopify_domain'),token=S.get('shopify_token')||S.get('shopify_access_token');
  if(!proxy||!domain||!token)throw new Error('Shopify non configuré — voir Connexions');
  const pl={domain,token,path,method};if(body)pl.body=body;
  const r=await fetch(proxy,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(pl)});
  if(!r.ok){const t=await r.text();throw new Error('Proxy '+r.status+': '+t)}
  const data=await r.json();
  // Récupère le header Link pour la pagination si présent
  const linkHeader=r.headers.get('x-shopify-link')||r.headers.get('link')||'';
  if(linkHeader)data.link=linkHeader;
  return data;
}
async function getAllArticles(blogId){
  let all=[],url='/admin/api/2024-01/blogs/'+blogId+'/articles.json?limit=50&fields=id,title,handle,published_at,updated_at,body_html,author,tags';
  while(url){
    const d=await sReq(url);
    const arts=d.articles||[];all=all.concat(arts);
    // Pagination par curseur
    const link=d.link||'';
    const next=link.match(/<([^>]+)>;\s*rel="next"/);
    if(next&&arts.length===50){
      // Extrait page_info du lien
      const pi=next[1].match(/page_info=([^&>]+)/);
      url=pi?'/admin/api/2024-01/blogs/'+blogId+'/articles.json?limit=50&page_info='+pi[1]:null;
    }else{url=null;}
  }
  return all;
}

function handleShopifyCallback(){
  const hash=window.location.hash;
  if(!hash.includes('shopify_token'))return;
  const params=new URLSearchParams(hash.slice(1));
  const token=params.get('shopify_token');
  const shop=params.get('shop');
  if(token&&shop){
    S.set('shopify_token',token);
    S.set('shopify_domain',shop);
    window.history.replaceState(null,'',window.location.pathname);
    toast('Shopify connecté avec succès','ok');
    setDot('ok');
    if(document.getElementById('p-connections').classList.contains('on'))rConn();
  }
}
function isGoogleTokenValid(){
  const token=S.get('google_access_token'),expiry=S.get('google_token_expiry');
  if(!token)return false;
  if(expiry&&Date.now()>expiry){S.set('google_access_token',null);return false;}
  return true;
}
function shopifyLogin(){
  const clientId=SHOPIFY_OAUTH_CLIENT_ID;
  const shop=S.get('shopify_domain')||prompt('Entre ton domaine Shopify (ex: mineralfrance.myshopify.com)');
  if(!shop)return;
  S.set('shopify_domain',shop);
  const proxyUrl=S.get('proxy_url');
  if(!proxyUrl){toast('Configure d abord l URL du proxy Cloudflare','err');return;}
  const redirectUri=proxyUrl+'/oauth/callback';
  const scopes='read_content,write_content,read_products,read_pages,write_pages,read_blogs,write_blogs,read_themes,read_metafields,write_metafields,read_online_store_pages,write_online_store_pages,write_theme_code,write_themes,read_files,write_files,read_products,write_products';
  const state=Math.random().toString(36).slice(2);
  S.set('shopify_oauth_state',state);
  window.location.href='https://'+shop+'/admin/oauth/authorize?client_id='+clientId+'&scope='+scopes+'&redirect_uri='+encodeURIComponent(redirectUri)+'&state='+state;
}
function googleLogin(){
  const clientId=S.get('google_client_id')||GOOGLE_DEFAULTS.client_id;
  const redirectUri=window.location.origin+window.location.pathname;
  const params=new URLSearchParams({client_id:clientId,redirect_uri:redirectUri,
    response_type:'token',scope:GOOGLE_SCOPES,include_granted_scopes:'true',prompt:'consent'});
  window.location.href='https://accounts.google.com/o/oauth2/v2/auth?'+params.toString();
}
function googleLogout(){
  S.set('google_access_token',null);S.set('google_token_expiry',null);
  toast('Google déconnecté');rConn();
}
function handleGoogleCallback(){
  const hash=window.location.hash;if(!hash)return;
  const params=new URLSearchParams(hash.slice(1));
  const token=params.get('access_token'),expiresIn=params.get('expires_in');
  if(token){
    S.set('google_access_token',token);
    S.set('google_token_expiry',Date.now()+parseInt(expiresIn)*1000);
    window.history.replaceState(null,'',window.location.pathname);
    toast('Google connecté avec succès','ok');
  }
}

function rDash(){
  const pg=document.getElementById('p-dashboard'),cfg=S.has(),gOk=isGoogleTokenValid();
  pg.innerHTML='<div class="ph"><div class="pt">Tableau de bord</div>'
    +'<div class="ps">'+new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'</div></div>'
    +(!cfg?'<div class="al al-i">◈ &nbsp;Bienvenue ! Configurez vos APIs dans <span style="text-decoration:underline;cursor:pointer;font-weight:500" onclick="nav(\'connections\')">Connexions →</span></div>':'')
    +'<div class="sgrid">'
    +'<div class="sc"><div class="sv" id="sa">—</div><div class="sl">Articles total</div></div>'
    +'<div class="sc"><div class="sv" id="sp2">—</div><div class="sl">Publiés</div></div>'
    +'<div class="sc"><div class="sv" id="sb">—</div><div class="sl">Blogs / pierres</div></div>'
    +'<div class="sc"><div class="sv" id="spm">—</div><div class="sl">Pages mères</div></div>'
    +'<div class="sc"><div class="sv">'+S.hist().length+'</div><div class="sl">Générés via cockpit</div></div>'
    +'</div>'
    +'<div class="card"><div class="ct">Statut des connexions</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px">'
    +[['Shopify',cfg],['Anthropic',!!S.get('anthropic_key')],['Google',gOk||!!S.getRaw('google_service_account')],['DataForSEO',!!S.get('dataforseo_login')],['Obsidian',!!S.get('obsidian_api_key')]]
      .map(([n,ok])=>'<div style="display:flex;align-items:center;gap:8px">'
        +'<span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;background:'+(ok?'var(--gn)':'var(--bd)')+'"></span>'
        +'<div><div style="font-size:13px;font-weight:500">'+n+'</div>'
        +'<div style="font-size:11.5px;color:var(--t3)">'+(ok?'Connecté':'Non configuré')+'</div></div></div>').join('')
    +'</div></div>'
    +'<div class="card"><div class="ct">Actions rapides</div><div class="tw">'
    +'<button class="btn bp" onclick="nav(\'create\')">✦ Créer un article</button>'
    +'<button class="btn bs" onclick="nav(\'articles\')">◎ Articles</button>'
    +'<button class="btn bs" onclick="nav(\'connections\')">⚡ Connexions</button>'
    +'</div></div>'
    +'<div class="card"><div class="ct">Activité récente</div>'+rRecent()+'</div>';
  if(cfg)lDash();
}
async function lDash(){
  try{
    const r=await sReq('/admin/api/2024-01/blogs.json');
    const blogs=r.blogs||[];setDot('ok');
    document.getElementById('sb').textContent=blogs.length;
    let tot=0,pub=0;
    await Promise.all(blogs.map(async b=>{try{const a=await getAllArticles(b.id);tot+=a.length;pub+=a.filter(x=>x.published_at).length;}catch{}}));
    document.getElementById('sa').textContent=tot;document.getElementById('sp2').textContent=pub;
    try{const pd=await sReq('/admin/api/2024-01/pages.json?limit=100&fields=id,title,handle');
      const PIERRES_EXACT=["agate", "aigue-marine", "amazonite", "amethyste", "apatite-bleue", "aventurine-bleue", "calcedoine", "citrine", "cornaline", "cristal-de-roche", "diamant", "emeraude", "grenat", "hematite", "howlite", "jade", "jaspe-rouge", "kunzite", "labradorite", "lapis-lazuli", "malachite", "obsidienne", "oeil-de-faucon", "oeil-de-taureau", "oeil-de-tigre", "pierre-de-lave", "pierre-de-lune", "pierre-de-soleil", "quartz-rose", "rhodochrosite", "rhodonite", "rubis", "saphir", "selenite", "sodalite", "tourmaline-noire"];
      const sp=(pd.pages||[]).filter(p=>PIERRES_EXACT.includes(p.handle));
      const pmEl=document.getElementById('spm');if(pmEl)pmEl.textContent=sp.length;}catch(_){}
  }catch(e){setDot('err');toast('Erreur Shopify : '+e.message,'err')}
}
function rRecent(){
  const h=S.hist().slice(0,5);
  if(!h.length)return'<div style="text-align:center;padding:20px;color:var(--t3)">Aucune activité pour l\'instant</div>';
  return h.map(e=>'<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd2)">'

function rBlogTabs(blogs){
  const body=document.getElementById('ab');
  body.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">'
    +'<div style="display:flex;gap:4px;flex-wrap:wrap" id="btabs">'
    +blogs.map((b,i)=>'<button class="btn '+(i===0?'bp':'bg')+'" data-bid="'+b.id+'" style="font-size:12.5px;padding:6px 12px">'+b.title+'</button>').join('')
    +'</div><button class="btn bg" id="aref" style="font-size:12.5px">⟳ Actualiser</button></div>'
    +'<div id="at"><div style="display:flex;align-items:center;gap:10px;color:var(--t2)">'+sp()+' Chargement…</div></div>';
  lBlogArts(blogs[0].id);
  document.getElementById('btabs').addEventListener('click',e=>{
    const btn=e.target.closest('button[data-bid]');if(!btn)return;
    document.querySelectorAll('#btabs button').forEach(b=>{b.className='btn '+(b===btn?'bp':'bg');b.style.fontSize='12.5px';b.style.padding='6px 12px';});
    lBlogArts(btn.dataset.bid);
  });
  document.getElementById('aref').onclick=()=>{const a=document.querySelector('#btabs button.bp');if(a)lBlogArts(a.dataset.bid);};
}
async function lBlogArts(blogId){
  const w=document.getElementById('at');
  w.innerHTML='<div style="display:flex;align-items:center;gap:10px;color:var(--t2)">'+sp()+' Chargement…</div>';
  try{
    const arts=await getAllArticles(blogId);
    arts.sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at));
    if(!arts.length){w.innerHTML='<div style="text-align:center;padding:48px;color:var(--t3)">Aucun article dans ce blog</div>';return;}
    w.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
      +'<span style="font-size:13px;color:var(--t2)">'+arts.length+' article'+(arts.length>1?'s':'')+'</span>'
      +'<input class="inp" id="as2" type="search" placeholder="Rechercher…" style="width:220px;padding:6px 10px;font-size:13px"></div>'
      +'<div class="tbl-wrap"><table><thead><tr><th>Titre</th><th>Statut</th><th>Mots</th><th>Mis à jour</th></tr></thead>'
      +'<tbody id="atb">'+arts.map(a=>{const words=wc(a.body_html||'');
        return'<tr data-t="'+(a.title||'').toLowerCase()+'">'
          +'<td><div style="font-weight:500">'+tr(a.title,60)+'</div>'
          +'<div style="font-size:11.5px;color:var(--t3);font-family:var(--mono);margin-top:2px">/'+a.handle+'</div></td>'
          +'<td><span class="bge '+(a.published_at?'b-green':'b-gray')+'">'+(a.published_at?'Publié':'Brouillon')+'</span></td>'
          +'<td style="color:'+(words<800?'var(--or)':'var(--t2)')+'">'+words.toLocaleString('fr')+'</td>'
          +'<td style="color:var(--t2);font-size:13px">'+fd(a.updated_at)+'</td></tr>';
      }).join('')+'</tbody></table></div>';
    document.getElementById('as2').oninput=e=>{const q=e.target.value.toLowerCase();document.querySelectorAll('#atb tr').forEach(r=>{r.style.display=r.dataset.t.includes(q)?'':'none';});};
  }catch(e){w.innerHTML='<div class="al al-w">⚠ '+e.message+'</div>';}
}

// ─── MISSION 2 — AUDIT GSC + GA4 ─────────────────────────────
async function optSelectArticle(articleId, blogId, handle, el) {
  // Met en surbrillance l'article sélectionné
  document.querySelectorAll('#opt-article-list > div').forEach(d => d.style.background = 'var(--bg2)');
  if (el) el.style.background = 'var(--ac2)';

  const state = window.optState;
  const article = state.articles.find(a => String(a.id) === String(articleId));
  if (!article) return;
  state.selectedArticle = article;

  addOptMessage('<strong>Article sélectionné :</strong> ' + article.title + '<br>Lancement de l\'audit GSC + GA4…', 'bot');
  addOptSpinner('spin-m2', 'Mission 2/10 — Audit GSC en cours…');

  try {
    const domain = S.get('site_domain') || 'mineralfrance.com';
    const articleUrl = 'https://' + domain + '/blogs/' + state.blogHandle + '/' + handle;

    // GSC pour cet article
    const token = await getServiceAccountToken(['https://www.googleapis.com/auth/webmasters.readonly']);
    const siteUrl = S.get('gsc_site_url') || 'https://' + domain + '/';
    const end = new Date().toISOString().split('T')[0];
    const start = new Date(Date.now()-90*24*60*60*1000).toISOString().split('T')[0];

    let gscArticle = null, ga4Article = null;

    if (token) {
      updateOptSpinner('spin-m2', 'Mission 2/10 — Récupération données GSC…');
      try {
        const gscResp = await fetch('https://www.googleapis.com/webmasters/v3/sites/' + encodeURIComponent(siteUrl) + '/searchAnalytics/query', {
          method: 'POST',
          headers: {'Authorization':'Bearer '+token,'Content-Type':'application/json'},
          body: JSON.stringify({
            startDate: start, endDate: end,
            dimensions: ['query'],
            dimensionFilterGroups: [{filters:[{dimension:'page',operator:'equals',expression:articleUrl}]}],
            rowLimit: 10
          })
        });
        gscArticle = await gscResp.json();
      } catch(_) {}

      // GA4
      updateOptSpinner('spin-m2', 'Mission 2/10 — Récupération données GA4…');
      const ga4PropId = S.get('ga4_property_id');
      if (ga4PropId) {
        try {
          const ga4Token = await getServiceAccountToken(['https://www.googleapis.com/auth/analytics.readonly']);
          const ga4Resp = await fetch('https://analyticsdata.googleapis.com/v1beta/properties/' + ga4PropId + ':runReport', {
            method: 'POST',
            headers: {'Authorization':'Bearer '+ga4Token,'Content-Type':'application/json'},
            body: JSON.stringify({
              dateRanges: [{startDate: start, endDate: end}],
              dimensions: [{name:'pagePath'}],
              metrics: [{name:'averageSessionDuration'},{name:'bounceRate'},{name:'screenPageViews'}],
              dimensionFilter: {filter:{fieldName:'pagePath',stringFilter:{matchType:'EXACT',value:'/blogs/'+state.blogHandle+'/'+handle}}}
            })
          });
          ga4Article = await ga4Resp.json();
        } catch(_) {}
      }
    }

    removeOptSpinner('spin-m2');

    // Calcule la priorité
    const topQuery = gscArticle?.rows?.[0];
    const position = topQuery?.position || 999;
    const impressions = gscArticle?.rows?.reduce((s,r)=>s+(r.impressions||0),0) || 0;
    const ga4Row = ga4Article?.rows?.[0];
    const avgDuration = ga4Row ? Math.round(parseFloat(ga4Row.metricValues[0].value)) : null;
    const bounceRate = ga4Row ? (parseFloat(ga4Row.metricValues[1].value)*100).toFixed(0) : null;
    const pageViews = ga4Row ? ga4Row.metricValues[2].value : null;

    let priority, priorityBadge;
    if (position >= 8 && position <= 15 && impressions >= 500) {
      priority = 'quick_win'; priorityBadge = '<span class="chat-badge cb-red">🔴 Quick win</span>';
    } else if (position >= 16 && position <= 30 && impressions >= 200) {
      priority = 'potential'; priorityBadge = '<span class="chat-badge cb-orange">🟡 Potentiel</span>';
    } else if (position >= 1 && position <= 7) {
      priority = 'good'; priorityBadge = '<span class="chat-badge cb-green">🟢 Bon</span>';
    } else {
      priority = 'rework'; priorityBadge = '<span class="chat-badge cb-gray">⚫ À retravailler</span>';
    }

    state.auditData = { gsc: gscArticle, ga4: ga4Article, priority, position, impressions, topQuery };

    const gscRows = gscArticle?.rows || [];
    addOptMessage(
      chatCard('⊹ Mission 2/10 — Audit "' + article.title + '"', [
        {
          title: 'Priorité',
          html: '<div style="margin:4px 0">' + priorityBadge + '</div>'
        },
        {
          title: 'Google Search Console',
          items: [
            {label: 'Mot-clé principal', value: topQuery ? '<strong>' + topQuery.keys[0] + '</strong>' : 'Non détecté'},
            {label: 'Position', value: topQuery ? posBadge(topQuery.position) : '<span class="chat-badge cb-gray">N/A</span>'},
            {label: 'Impressions (90j)', value: impressions > 0 ? impressions.toLocaleString('fr') : '0'},
            {label: 'CTR moyen', value: topQuery ? (topQuery.ctr*100).toFixed(1) + '%' : 'N/A'}
          ]
        },
        gscRows.length > 1 ? {
          title: 'Top requêtes',
          list: gscRows.slice(0,5).map(r =>
            posBadge(r.position) + '<span style="flex:1">"' + r.keys[0] + '"</span>' +
            '<span style="color:var(--t3);font-size:11.5px">' + r.impressions + ' imp.</span>'
          )
        } : null,
        avgDuration !== null ? {
          title: 'Google Analytics 4',
          items: [
            {label: 'Durée moyenne', value: Math.floor(avgDuration/60) + 'min ' + (avgDuration%60) + 's'},
            {label: 'Taux rebond', value: bounceRate + '%'},
            {label: 'Pages vues', value: pageViews || 'N/A'}
          ]
        } : {title: 'GA4', html: '<div style="color:var(--t3);font-size:12.5px">Données GA4 non disponibles</div>'}
      ].filter(Boolean)) +
      '<div class="chat-action"><button class="btn bp" onclick="optM3()">Lancer l\'analyse complète →</button></div>',
      'bot'
    );

  } catch(e) {
    removeOptSpinner('spin-m2');
    addOptMessage('Erreur audit : ' + e.message, 'bot');
  }
}

// ─── MISSION 3 — CHARGER ET PARSER L'ARTICLE ─────────────────
async function optM3() {
  const state = window.optState;
  const article = state.selectedArticle;
  addOptSpinner('spin-m3', 'Mission 3/10 — Chargement et parsing de l\'article…');

  try {
    const fullData = await sReq('/admin/api/2024-01/blogs/' + article.blog_id + '/articles/' + article.id + '.json');
    const a = fullData.article;
    state.articleData = a;

    const html = a.body_html || '';
    const wordCount = wc(html);

    // Parsing mécanique
    const h2s = [...html.matchAll(/<h2[^>]*>([^<]+)<\/h2>/gi)].map(m=>m[1].trim());
    const h3s = [...html.matchAll(/<h3[^>]*>([^<]+)<\/h3>/gi)].map(m=>m[1].trim());
    const hasFaq = /faq|question|répon/i.test(html);
    const hasConclusion = /conclusion|pour finir|en résumé/i.test(html);

    // Parsing liens
    const domain = S.get('site_domain') || 'mineralfrance.com';
    const allLinks = [...html.matchAll(/href="([^"]+)"[^>]*>([^<]+)</gi)].map(m=>({url:m[1],text:m[2]}));
    const internalLinks = allLinks.filter(l=>l.url.includes(domain)||l.url.startsWith('/'));
    const productLinks = allLinks.filter(l=>l.url.includes('/products/'));
    const collectionLinks = allLinks.filter(l=>l.url.includes('/collections/'));
    const pageLinks = allLinks.filter(l=>l.url.includes('/pages/'));
    const externalLinks = allLinks.filter(l=>!l.url.includes(domain)&&!l.url.startsWith('/')&&l.url.startsWith('http'));

    // Parsing images
    const images = [...html.matchAll(/<img[^>]+>/gi)].map((m,i)=>({
      tag: m[0], src: (m[0].match(/src="([^"]+)"/)||[])[1]||'',
      alt: (m[0].match(/alt="([^"]*)"/)||[])[1]||'', index: i
    }));
    state.images = images;

    // JSON-LD
    const hasJsonLd = html.includes('application/ld+json');

    removeOptSpinner('spin-m3');
    state.parsedData = { wordCount, h2s, h3s, hasFaq, hasConclusion, internalLinks, productLinks, collectionLinks, pageLinks, externalLinks, images, hasJsonLd, metaTitle: a.meta_title, metaDesc: a.meta_description };

    addOptMessage(
      chatCard('◈ Mission 3/10 — Article chargé', [
        {
          title: a.title,
          items: [
            {label: 'Contenu', value: wordCount + ' mots'},
            {label: 'Structure', value: h2s.length + ' H2 · ' + h3s.length + ' H3'},
            {label: 'FAQ', value: hasFaq ? '<span class="chat-badge cb-green">✓ Présente</span>' : '<span class="chat-badge cb-orange">✗ Absente</span>'},
            {label: 'Meta title', value: a.meta_title ? '<span class="chat-badge cb-green">✓</span>' : '<span class="chat-badge cb-orange">✗ Absente</span>'},
            {label: 'Meta description', value: a.meta_description ? '<span class="chat-badge cb-green">✓</span>' : '<span class="chat-badge cb-orange">✗ Absente</span>'},

// ─── MISSION 4 — ANALYSE SÉMANTIQUE ──────────────────────────
async function optM4() {
  const state = window.optState;
  const article = state.selectedArticle;
  const parsed = state.parsedData;
  addOptSpinner('spin-m4', 'Mission 4/10 — Analyse sémantique DataForSEO…');

  try {
    // Détermine le mot-clé cible depuis GSC
    const targetKw = state.auditData?.topQuery?.keys?.[0] || article.title.toLowerCase().split(' ').slice(0,3).join(' ');

    // DataForSEO — SERP + variantes + PAA
    updateOptSpinner('spin-m4', 'Mission 4/10 — SERP top 10…');
    const serpData = await getSerp(targetKw);

    updateOptSpinner('spin-m4', 'Mission 4/10 — Variantes sémantiques…');
    const stone = targetKw.split(' ')[0];
    const variants = [targetKw, stone+' propriétés', stone+' vertus', stone+' bienfaits', stone+' lithothérapie', stone+' chakra', stone+' signification', stone+' utilisation', stone+' comment', stone+' purification'];
    const volData = await dfsReq('/v3/keywords_data/google_ads/search_volume/live', [{keywords: variants, language_code:'fr', location_code:2250}]);
    const kwVariants = (volData?.tasks?.[0]?.result||[]).filter(r=>r.search_volume>0).sort((a,b)=>b.search_volume-a.search_volume);

    // Extrait les PAA depuis le SERP
    const paaItems = serpData?.items?.filter(i=>i.type==='people_also_ask') || [];
    const paaQuestions = paaItems.flatMap(i=>i.items||[]).map(i=>i.title||i.question||'').filter(Boolean).slice(0,8);

    // Appel Claude M4
    updateOptSpinner('spin-m4', 'Mission 4/10 — Analyse sémantique Claude…');
    const prompt4 = S.get('prompt_opt_m4') || DEF_PROMPTS.prompt_opt_m4;
    const articleText = (parsed?.h2s||[]).join(' | ') + ' | ' + (state.articleData?.body_html||'').replace(/<[^>]+>/g,' ').slice(0,2000);
    const serpSummary = serpData?.items?.filter(i=>i.type==='organic').slice(0,5).map(i=>i.title+' - '+i.domain).join('\n') || '';
    const variantsList = kwVariants.map(v=>v.keyword+' ('+v.search_volume+'/mois)').join('\n');

    const m4Result = await callAnthropic(prompt4,
      'ARTICLE: ' + articleText + '\n\nMOT-CLÉ: ' + targetKw +
      '\n\nSERP: ' + serpSummary + '\n\nVARIANTES: ' + variantsList +
      '\n\nPAA: ' + paaQuestions.join('\n') +
      '\nRéponds en JSON: {"retained_variants":[],"ignored_variants":[],"missing_subtopics":[],"paa_to_integrate":[],"semantic_score":0,"notes":""}',
      1500
    );

    const m4 = JSON.parse(m4Result.replace(/```json|```/g,'').trim());
    state.semanticData = { ...m4, targetKw, serpData, kwVariants, paaQuestions };

    removeOptSpinner('spin-m4');
    addOptMessage(
      chatCard('◈ Mission 4/10 — Analyse sémantique', [
        {
          title: 'Mot-clé cible : ' + targetKw,
          items: [
            {label: 'Score sémantique', value: '<span class="chat-badge ' + (m4.semantic_score>=70?'cb-green':m4.semantic_score>=40?'cb-orange':'cb-red') + '">' + (m4.semantic_score||0) + '/100</span>'},
            {label: 'Variantes à intégrer', value: (m4.retained_variants||[]).length + ' expressions'},
            {label: 'Sous-thèmes manquants', value: (m4.missing_subtopics||[]).length + ' sujets'}

// ─── MISSION 9 — ASSEMBLAGE + MÉTADONNÉES ────────────────────
async function optM9() {
  const state = window.optState;
  addOptSpinner('spin-m9', 'Mission 9/10 — Assemblage de l\'article…');

  try {
    const plan = state.plan;
    const original = state.articleData?.body_html || '';
    const domain = S.get('site_domain') || 'mineralfrance.com';

    // Construit l'article dans l'ordre du plan
    const allSections = [];

    // Sections conservées — extrait depuis le HTML original
    for (const title of (plan.sections_a_conserver||[])) {
      const escaped = title.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').slice(0, 20);
      const regex = new RegExp('<h2[^>]*>[^<]*' + escaped + '[^<]*<\/h2>[\\s\\S]*?(?=<h2|$)', 'i');
      const match = original.match(regex);
      if (match) allSections.push(match[0]);
    }

    // Sections réécrites / ajoutées
    for (const sec of state.sections) {
      allSections.push(sec.html);
    }

    // Réinjecte les images aux positions originales
    let assembled = allSections.join('\n\n');
    // Réinjecte les images si elles sont présentes dans le HTML original
    const imgMatches = [...original.matchAll(/<img[^>]+>/gi)];
    if (imgMatches.length > 0 && assembled.indexOf('<img') === -1) {
      // Insère la première image après le premier paragraphe
      assembled = assembled.replace('</p>', '</p>\n' + (imgMatches[0]?.[0]||''));
    }

    state.assembledHtml = assembled;

    // Génère les métadonnées via Claude
    updateOptSpinner('spin-m9', 'Mission 9/10 — Génération des métadonnées…');
    const prompt9 = S.get('prompt_opt_m9') || DEF_PROMPTS.prompt_opt_m9;
    const metaResult = await callAnthropic(prompt9,
      'ARTICLE: ' + assembled.replace(/<[^>]+>/g,' ').slice(0,1500) +
      '\nMOT-CLÉ: ' + state.semanticData.targetKw +
      '\nDOMAINE: ' + domain +
      '\nBLOG: ' + state.blogHandle +
      '\nHANDLE: ' + state.selectedArticle.handle +
      '\nTITRE: ' + state.selectedArticle.title,
      2000
    );

// ─── DATAFORSEO API ───────────────────────────────────────────
async function dfsReq(endpoint, payload) {
  const login = S.get('dataforseo_login'), pass = S.get('dataforseo_pass');
  if (!login || !pass) return null;
  const auth = btoa(login + ':' + pass);
  try {
    const r = await fetch('https://api.dataforseo.com' + endpoint, {
      method: 'POST',
      headers: { 'Authorization': 'Basic ' + auth, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    return r.json();
  } catch { return null; }
}

async function getKeywordVariants(baseKeyword) {
  // Teste plusieurs variantes et retourne celle avec le meilleur volume
  const stone = baseKeyword.split(' ')[0];
  const variants = [
    baseKeyword,
    stone + ' propriétés',
    stone + ' vertus',
    stone + ' lithothérapie',
    stone + ' bienfaits',
    stone + ' symbolique',
    stone + ' chakra',
    stone + ' méditation',
    stone + ' protection',
    stone + ' sommeil'

// ─── GSC API ──────────────────────────────────────────────────
// Génère un token d'accès depuis le compte de service via JWT
async function getServiceAccountToken(scopes) {
  const saJson = S.getRaw('google_service_account');
  if (!saJson) return null;
  try {
    const sa = JSON.parse(saJson);
    const now = Math.floor(Date.now() / 1000);
    const header = btoa(JSON.stringify({alg:'RS256',typ:'JWT'})).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
    const payload = btoa(JSON.stringify({
      iss: sa.client_email,
      scope: scopes.join(' '),
      aud: 'https://oauth2.googleapis.com/token',
      exp: now + 3600,
      iat: now
    })).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');

    // Import la clé privée
    const pemContents = sa.private_key.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
    const binaryDer = Uint8Array.from(atob(pemContents), c => c.charCodeAt(0));
    const cryptoKey = await crypto.subtle.importKey(
      'pkcs8', binaryDer.buffer,
      {name:'RSASSA-PKCS1-v1_5', hash:'SHA-256'},
      false, ['sign']
    );

    // Signe le JWT
    const signingInput = header + '.' + payload;
    const signature = await crypto.subtle.sign(
      'RSASSA-PKCS1-v1_5', cryptoKey,
      new TextEncoder().encode(signingInput)
    );
    const sig = btoa(String.fromCharCode(...new Uint8Array(signature))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
    const jwt = signingInput + '.' + sig;

    // Échange le JWT contre un access token
    const r = await fetch('https://oauth2.googleapis.com/token', {
      method: 'POST',
      headers: {'Content-Type':'application/x-www-form-urlencoded'},
      body: 'grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=' + jwt
    });
    const data = await r.json();
    return data.access_token || null;
  } catch(e) {
    console.error('Service account token error:', e);
    return null;
  }
}

async function getGscData(keyword) {
  const siteUrl = S.get('gsc_site_url');
  if (!siteUrl) return null;
  let token = S.get('google_access_token');
  if (!token || !isGoogleTokenValid()) {
    token = await getServiceAccountToken(['https://www.googleapis.com/auth/webmasters.readonly']);
  }
  if (!token) return null;
  const end = new Date().toISOString().split('T')[0];
  const start = new Date(Date.now() - 90*24*60*60*1000).toISOString().split('T')[0];
  try {
    const r = await fetch('https://www.googleapis.com/webmasters/v3/sites/' + encodeURIComponent(siteUrl) + '/searchAnalytics/query', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        startDate: start, endDate: end,
        dimensions: ['query'],
        dimensionFilterGroups: [{ filters: [{ dimension: 'query', operator: 'contains', expression: keyword.split(' ')[0] }] }],
        rowLimit: 20
      })
    });
    return r.json();
  } catch { return null; }
}

// ─── OBSIDIAN EXPORT ──────────────────────────────────────────
async function exportToObsidian(articles, pages, blogs) {
  const files = [];
  const domain = S.get('site_domain') || 'mineralfrance.com';

  // Filtre uniquement les pages pierres (pas les CGV, politique etc)
  const PIERRES_EXPORT = ["agate","aigue-marine","amazonite","amethyste","apatite-bleue",
    "aventurine-bleue","calcedoine","citrine","cornaline","cristal-de-roche","diamant",
    "emeraude","grenat","hematite","howlite","jade","jaspe-rouge","kunzite","labradorite",
    "lapis-lazuli","malachite","obsidienne","oeil-de-faucon","oeil-de-taureau","oeil-de-tigre",
    "pierre-de-lave","pierre-de-lune","pierre-de-soleil","quartz-rose","rhodochrosite",
    "rhodonite","rubis","saphir","selenite","sodalite","tourmaline-noire"];
  const stonePages = pages.filter(p => PIERRES_EXPORT.includes(p.handle));

  // Index général
  let indexMd = '---\ntitle: INDEX\ntype: index\n---\n\n';
  indexMd += '# Cocon Sémantique — Minéral France\n\n';
  indexMd += '> Exporté le ' + new Date().toLocaleDateString('fr-FR') + '\n\n';
  indexMd += '## Pages mères (' + stonePages.length + ' pierres)\n\n';
  stonePages.forEach(page => {
    const count = articles.filter(a => a.body_html && a.body_html.includes('/pages/' + page.handle)).length;
    indexMd += '- [[' + page.handle + ']] — ' + page.title + ' (' + count + ' satellites)\n';
    files.push({ name: page.handle + '.md', content: generatePageMd(page, articles, domain) });
  });

  // Blogs généralistes
  const genBlogs = blogs.filter(b => !PIERRES_EXPORT.some(p => b.handle.includes(p.slice(0,5))));
  if (genBlogs.length) {
    indexMd += '\n## Blogs généralistes\n\n';
    genBlogs.forEach(b => { indexMd += '- ' + b.title + '\n'; });
  }

  files.unshift({ name: 'INDEX.md', content: indexMd });

  // Articles
  articles.forEach(a => {
    files.push({
      name: (a.handle || 'article-' + a.id) + '.md',
      content: generateArticleMd(a, pages, domain)
    });
  });

  // Génère le ZIP via téléchargement multiple ou JSZip si dispo
  downloadObsidianZip(files);
}

function generatePageMd(page, articles, domain) {
  // Trouve les articles satellites (ceux qui linkent vers cette page mère)
  const related = articles.filter(a => 
    (a.body_html && a.body_html.includes('/pages/' + page.handle)) ||
    (a.blog_handle && a.blog_handle.includes(page.handle.slice(0,5)))
  );
  related.sort((a,b) => new Date(a.published_at||a.created_at) - new Date(b.published_at||b.created_at));
  
  let md = '---\n';
  md += 'title: ' + page.title + '\n';
  md += 'type: page-mere\n';
  md += 'url: https://' + domain + '/pages/' + page.handle + '\n';
  md += 'satellites: ' + related.length + '\n';
  md += '---\n\n';
  md += '# ' + page.title + ' (Page mère)\n\n';
  md += '**URL** : [' + page.title + '](https://' + domain + '/pages/' + page.handle + ')\n';
  md += '**Satellites** : ' + related.length + ' article' + (related.length > 1 ? 's' : '') + '\n\n';
  md += '## Cocon sémantique\n\n';
  md += '- [[INDEX]] ← Page racine\n\n';
  md += '## Articles satellites\n\n';
  related.forEach((a, i) => {
    const prev = i > 0 ? related[i-1] : null;
    md += (i+1) + '. [[' + a.handle + ']] — ' + (a.published_at ? '✅' : '📝') + ' ' + a.title + '\n';
    if (prev) md += '   ← lié à [[' + prev.handle + ']]\n';
  });
  md += '\n';
  return md;
}

function generateArticleMd(a, pages, domain) {
  // Trouve la page mère depuis les liens dans l'article
  let parentLink = '';
  if (a.body_html) {
    const pageHandles = pages.map(p => p.handle);
    for (const ph of pageHandles) {
      if (a.body_html.includes('/pages/' + ph)) {
        const page = pages.find(p => p.handle === ph);
        if (page) { parentLink = '\n- Page mère : [[' + page.handle + ']]'; break; }
      }
    }
  }
  let md = '---\n';
  md += 'title: ' + (a.title || '').replace(/:/g, '-') + '\n';
  md += 'statut: ' + (a.published_at ? 'publié' : 'brouillon') + '\n';
  md += 'date: ' + ((a.published_at || a.created_at || '').split('T')[0]) + '\n';
  md += 'blog: ' + (a.blog_title || '') + '\n';
  md += 'url: https://' + domain + '/blogs/' + (a.blog_handle || 'blog') + '/' + a.handle + '\n';
  md += '---\n\n';
  md += '# ' + a.title + '\n\n';
  md += '**URL** : [' + a.title + '](https://' + domain + '/blogs/' + (a.blog_handle || 'blog') + '/' + a.handle + ')\n';
  md += '**Blog** : ' + (a.blog_title || '') + '\n';
  md += '**Statut** : ' + (a.published_at ? '✅ Publié' : '📝 Brouillon') + '\n';
  md += '**Mots** : ' + wc(a.body_html || '') + '\n';
  if (parentLink) md += parentLink + '\n';
  md += '\n## Liens internes détectés\n\n';
  if (a.body_html) {
    const links = [...a.body_html.matchAll(/href="([^"]+)"/g)].map(m => m[1]).filter(l => l.includes(domain) || l.startsWith('/'));
    const internalLinks = [...new Set(links)].slice(0, 10);
    internalLinks.forEach(l => { md += '- ' + l + '\n'; });
  }
  md += '\n';
  return md;
}

async function downloadObsidianZip(files) {
  // Charge JSZip depuis CDN
  if (!window.JSZip) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }
  const zip = new window.JSZip();
  const folder = zip.folder('cocon-mineralfrance');
  files.forEach(f => folder.file(f.name, f.content));
  const blob = await zip.generateAsync({type:'blob'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'cocon-obsidian.zip'; a.click();
  URL.revokeObjectURL(url);
  toast('Export Obsidian ZIP téléchargé — dézippe dans ton vault', 'ok');
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();

  // Détecte si l'utilisateur confirme la rédaction
  const isConfirm = /^(oui|ok|go|valide|génère|rédige|lance|c'est bon|parfait|top)$/i.test(msg.trim());
  // Détecte si c'est une nouvelle demande d'article
  const isNewArticle = /article|rédige|écris|crée|blog|sujet|manque|cocon|compléter|complet/i.test(msg) && state.step === 'idle';

  if (state.step === 'brief_ready' && isConfirm) {
    await generateArticle();
  } else if (isNewArticle) {
    state.step = 'idle';
    await analyzeRequest(msg);
  } else {
    // Mode conversationnel — l'IA répond en tenant compte du contexte actuel
    await contextualChat(msg);
  }
}

// Helper pour créer des cartes chat bien structurées
function chatCard(title, sections) {
  let html = '<div class="chat-card">';
  if (title) html += '<div class="chat-card-title">' + title + '</div>';
  sections.forEach((s, i) => {
    html += '<div class="chat-section">';
    if (s.title) html += '<div style="font-weight:600;font-size:12.5px;margin-bottom:6px;color:var(--t1)">' + s.title + '</div>';
    if (s.items) {
      s.items.forEach(item => {
        html += '<div class="chat-kv"><span class="chat-kv-label">' + item.label + '</span><span class="chat-kv-value">' + item.value + '</span></div>';
      });
    }
    if (s.list) {
      html += '<ul class="chat-list">' + s.list.map(l => '<li>' + l + '</li>').join('') + '</ul>';
    }
    if (s.html) html += s.html;
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function posBadge(pos) {
  const p = Math.round(pos);
  if (p <= 7) return '<span class="chat-pos pos-green">' + p + '</span>';
  if (p <= 15) return '<span class="chat-pos pos-orange">' + p + '</span>';
  if (p <= 30) return '<span class="chat-pos pos-red">' + p + '</span>';
  return '<span class="chat-pos pos-gray">' + p + '</span>';
}

function volBadge(vol) {
  if (!vol || vol === 'N/A') return '<span class="chat-badge cb-gray">N/A</span>';
  if (vol >= 1000) return '<span class="chat-badge cb-green">' + vol.toLocaleString('fr') + '/mois</span>';
  if (vol >= 200) return '<span class="chat-badge cb-blue">' + vol.toLocaleString('fr') + '/mois</span>';
  return '<span class="chat-badge cb-gray">' + vol + '/mois</span>';
}

function addChatMessage(text, role) {
  const container = document.getElementById('chat-messages');
  if (!container) return;
  const isBot = role === 'bot';
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:10px;align-items:flex-start';
  div.innerHTML = (isBot ? '<div style="width:28px;height:28px;border-radius:50%;background:var(--ac2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">◈</div>' : '<div style="width:28px;height:28px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">Vous</div>')
    + '<div style="background:' + (isBot ? 'var(--bg2)' : 'var(--ac2)') + ';border-radius:var(--r2);padding:12px 14px;font-size:13.5px;line-height:1.6;max-width:90%">' + text + '</div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addChatSpinner(id) {

async function generateArticle() {

    const secondaryKws = state.relatedKeywords?.slice(0,8).map(k => k.keyword).join(', ') || '';

    const coveredTopics = [

    const userMessage = `CONSIGNES STRICTES :

${serpSummary}

${gscSummary}

- ${coveredTopics}

Extraits des 5 derniers articles pour cohérence éditoriale :
${articlesContext}

- Article précédent : https://${domain}/blogs/${state.blogId}/${state.prevArticle?.handle || ''} — "${state.prevArticle?.title || 'Premier article du blog'}"

═══ CHAMP SÉMANTIQUE — VARIATION LEXICALE OBLIGATOIRE ═══
Désignations à alterner (jamais deux fois le même terme dans un paragraphe) :
${semDesignations || "améthyste, cette pierre, ce cristal violet, la gemme, le minéral"}
Termes minéralogiques : ${semMineralogy || "quartz macrocristallin, dioxyde de silicium"}

Règle densité : mot-clé principal max 1.5% du texte.
Règle variation : alterner TOUTES les désignations naturellement.
INTERDIT : répétitions mécaniques comme "pierre améthyste", "améthyste pierre", etc.

═══ LONGUE TRAÎNE À INTÉGRER NATURELLEMENT ═══
${longtailList}

═══ RÉGLAGES ÉDITORIAUX ═══
Ton : ${S.get('editorial_tone') || 'Expert, pédagogique, vouvoiement'}
Domaine : ${domain}
Auteur : ${S.get('author_name') || 'Jade Litho'}

Génère maintenant l'article complet avec la fiche technique et la checklist.`;

    const result = await callAnthropic(systemPrompt, userMessage, 8000);

    removeChatSpinner('spin-write');

    // Parse le résultat
    const articleMatch = result.match(/---ARTICLE---([\s\S]*?)---FICHE_TECHNIQUE---/);
    const ficheMatch = result.match(/---FICHE_TECHNIQUE---([\s\S]*?)---CHECKLIST---/);
    const checklistMatch = result.match(/---CHECKLIST---([\s\S]*?)$/);

    const articleHtml = articleMatch ? articleMatch[1].trim() : result;

  } catch (e) {
    removeChatSpinner('spin-write');

function renderCoconView(blogs, pages, articles) {
  const body = document.getElementById('cocon-body');
  const domain = S.get('site_domain') || 'mineralfrance.com';

  // Page index
  const indexPage = pages.find(p => p.handle.includes('index'));

  // Associe chaque blog à sa page mère
  // Liste de référence des pierres
  const PIERRES_REF = ["agate", "aigue-marine", "amazonite", "amethyste", "apatite-bleue", "aventurine-bleue", "calcedoine", "citrine", "cornaline", "cristal-de-roche", "diamant", "emeraude", "grenat", "hematite", "howlite", "jade", "jaspe-rouge", "kunzite", "labradorite", "lapis-lazuli", "malachite", "obsidienne", "oeil-de-faucon", "oeil-de-taureau", "oeil-de-tigre", "pierre-de-lave", "pierre-de-lune", "pierre-de-soleil", "quartz-rose", "rhodochrosite", "rhodonite", "rubis", "saphir", "selenite", "sodalite", "tourmaline-noire"];
  
  const isBlogPierre = (blog) => {
    const h = blog.handle.toLowerCase();
    return PIERRES_REF.some(p => h.includes(p));
  };

  // Trie : blogs génériques d'abord, puis blogs pierres
  const sortedBlogs = [
    ...blogs.filter(b => !isBlogPierre(b)),
    ...blogs.filter(b => isBlogPierre(b))
  ];

  const cocon = sortedBlogs.map(blog => {
    const blogArts = articles.filter(a => a.blog_id === blog.id);
    blogArts.sort((a, b) => new Date(a.published_at || a.created_at) - new Date(b.published_at || b.created_at));

    // Trouve la page mère par correspondance de handle
    // Nettoie le handle du blog pour extraire le nom de la pierre
    const cleanHandle = blog.handle
      .replace('guide-de-lamethyste','amethyste')
      .replace(/guide-de-loeil/,'oeil')
      .replace(/guide-de-l[ae]?-?/,'')
      .replace(/guide-du-/,'')
      .replace(/guide-des-/,'')
      .replace(/guide-de-/,'')
      .replace(/guide-/,'')
      .replace(/^l-/,'').replace(/^la-/,'').replace(/^le-/,'').replace(/^les-/,'')
      .replace(/^-/,'').replace(/-$/,'');

    // Les blogs généralistes (pierres-naturelles, chakras...) n'ont pas de page mère
    const isGeneralist = !isBlogPierre(blog);
    
    // Cherche la page mère UNIQUEMENT dans la liste exacte des 36 pierres
    const parentPage = isGeneralist ? null : (
      PIERRES_REF.includes(cleanHandle) && pages.find(p => p.handle === cleanHandle) ||
      pages.find(p => PIERRES_REF.includes(p.handle) && p.handle === cleanHandle) ||
      pages.find(p => PIERRES_REF.includes(p.handle) && cleanHandle.length > 5 && p.handle === cleanHandle.replace(/-/g,'').slice(0,8)) ||
      pages.find(p => PIERRES_REF.includes(p.handle) && p.handle.startsWith(cleanHandle.slice(0,6)) && cleanHandle.length > 5) ||
      null
    );

    return { blog, articles: blogArts, parentPage };
  });

  body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <div>
        ${indexPage ? '<span class="bge b-purple" style="font-size:13px;padding:4px 12px">🌐 Index : <a href="https://' + domain + '/pages/' + indexPage.handle + '" target="_blank" style="color:inherit">' + indexPage.title + '</a></span>' : ''}
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn bs" onclick="exportObsidianFromCocon()">⬟ Exporter vers Obsidian</button>
      </div>
    </div>

    ${cocon.map(({blog, articles: arts, parentPage}) => `
      <div class="card" style="margin-bottom:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div>
            <div style="font-size:15px;font-weight:600">${blog.title}</div>
            ${parentPage
              ? '<div style="font-size:12.5px;color:var(--t2);margin-top:2px">Page mère : <a href="https://' + domain + '/pages/' + parentPage.handle + '" target="_blank" style="color:var(--ac);text-decoration:none">' + parentPage.title + ' ↗</a></div>'
              : '<div style="font-size:12.5px;color:var(--t3);margin-top:2px">' + (isBlogPierre(blog) ? '⚠ Page mère non détectée' : 'Blog généraliste — pas de page mère') + '</div>'}
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="bge b-green">${arts.filter(a => a.published_at).length} publiés</span>
            <span class="bge b-gray">${arts.filter(a => !a.published_at).length} brouillons</span>
            <span class="bge b-purple">${arts.length} total</span>
          </div>
        </div>

        <div>
          <button style="width:100%;padding:8px 12px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg3);font-size:13px;font-weight:500;color:var(--t1);cursor:pointer;text-align:left;margin-bottom:8px;font-family:var(--font)"
            onclick="const nx=this.nextElementSibling;const open=nx.style.display!=='flex';nx.style.display=open?'flex':'none';this.innerHTML=open?'▼ &nbsp;Masquer les articles (${arts.length})':'▶ &nbsp;Voir les articles (${arts.length})'">
            ▶ &nbsp;Voir les articles (${arts.length})
          </button>
          <div style="display:none;flex-direction:column;gap:4px">
            ${arts.length === 0
              ? '<div style="color:var(--t3);font-size:13px;text-align:center;padding:16px">Aucun article — <span style="color:var(--ac);cursor:pointer" onclick="nav(\'create\')">Créer le premier →</span></div>'
              : arts.map((a, i) => '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border-radius:var(--r);font-size:13px">'
                + '<span style="color:var(--t3);font-size:11px;width:20px;text-align:center">' + (i+1) + '</span>'
                + '<span style="font-weight:500;flex:1">' + tr(a.title,50) + '</span>'
                + '<span class="bge ' + (a.published_at?'b-green':'b-gray') + '" style="font-size:11px">' + (a.published_at?'Publié':'Brouillon') + '</span>'
                + '<span style="color:var(--t3);font-size:12px">' + wc(a.body_html||'') + ' mots</span>'
                + '<a href="https://' + domain + '/blogs/' + blog.handle + '/' + a.handle + '" target="_blank" style="color:var(--ac);font-size:12px;text-decoration:none">↗</a>'
                + '</div>').join('')}
          </div>
        </div>
      </div>
    `).join('')}`;

  // Stocke pour l'export
  window._coconData = { blogs, pages, articles };
}

async function exportObsidianFromCocon() {
  const data = window._coconData;
  if (!data) { toast('Chargez d\'abord le cocon', 'err'); return; }
  toast('Génération de l\'export Obsidian…');
  await exportToObsidian(data.articles, data.pages, data.blogs);
}
