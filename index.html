<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Litho SEO Cockpit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-gem">◈</span>
          <span class="logo-text">Litho SEO</span>
        </div>
        <div id="connection-status" class="status-dot status-unknown" title="Statut connexion Shopify"></div>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard">
          <span class="nav-icon">⬡</span>
          <span>Tableau de bord</span>
        </a>
        <a href="#" class="nav-item" data-page="articles">
          <span class="nav-icon">◎</span>
          <span>Articles</span>
        </a>
        <a href="#" class="nav-item" data-page="create">
          <span class="nav-icon">✦</span>
          <span>Créer un article</span>
        </a>
        <a href="#" class="nav-item" data-page="optimize">
          <span class="nav-icon">⟳</span>
          <span>Optimiser</span>
        </a>
        <a href="#" class="nav-item" data-page="cocon">
          <span class="nav-icon">⬟</span>
          <span>Cocon</span>
        </a>
        <a href="#" class="nav-item" data-page="history">
          <span class="nav-icon">◷</span>
          <span>Historique</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="#" class="nav-item" data-page="settings">
          <span class="nav-icon">⚙</span>
          <span>Réglages</span>
        </a>
      </div>
    </aside>

    <!-- Main content -->
    <main id="main">
      <div id="page-dashboard" class="page active"></div>
      <div id="page-articles" class="page"></div>
      <div id="page-create" class="page"></div>
      <div id="page-optimize" class="page"></div>
      <div id="page-cocon" class="page"></div>
      <div id="page-history" class="page"></div>
      <div id="page-settings" class="page"></div>
    </main>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container"></div>

  <script src="js/storage.js"></script>
  <script src="js/shopify.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/articles.js"></script>
  <script src="js/pages/placeholders.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
